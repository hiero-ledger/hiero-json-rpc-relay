relay:
  image:
    registry: "docker.io"
    repository: "library/relay-local"
    tag: "0.73.0"
    pullPolicy: Never
  resources:
    requests:
      cpu: 0
      memory: 0
    limits:
      cpu: 1100m
      memory: 128Mi
  config:
    npm_package_version: "0.76.0-SNAPSHOT"
    WORKERS_POOL_ENABLED: "false"
    PRETTY_LOGS_ENABLED: "false"
    NODE_OPTIONS: "--max-old-space-size=64 --max-semi-space-size=2 "
