{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  labels: {{ include "json-rpc-relay-ws.labels" . | nindent 4 }}
  name: {{ include "json-rpc-relay-ws.fullname" . }}
  namespace: {{ include "json-rpc-relay-ws.namespace" . }}
type: Opaque
stringData:
  OPERATOR_ID_MAIN: {{ .Values.config.OPERATOR_ID_MAIN | default "" | quote }}
  OPERATOR_KEY_MAIN: {{ .Values.config.OPERATOR_KEY_MAIN | default "" | quote }}
{{- end }}
