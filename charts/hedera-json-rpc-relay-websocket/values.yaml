# Default values for json-rpc-relay.
affinity: {}

autoscaling:
  enabled: false
  # When unset, minReplicas defaults to .Values.replicaCount
  # minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80
  # Load balancer RPS-based autoscaling. Uses an External metric exposed by a
  # metrics adapter (e.g. Prometheus Adapter, Stackdriver, CloudWatch). The HPA
  # scales up when the total observed RPS exceeds targetUtilizationPercentage
  # of totalRPS. For cloud-provider native signals (e.g. GCP GCLB capacity
  # utilization) prefer `autoscaling.extraMetrics` below.
  loadBalancerRPS:
    enabled: false
    # Total target RPS capacity for the load balancer fronting this service
    totalRPS: 1000
    # Scale up when current total RPS exceeds this percentage of totalRPS
    targetUtilizationPercentage: 80
    # Name of the external metric exposed by the metrics adapter
    metricName: loadbalancer_requests_per_second
    # Optional matchLabels selector to identify the metric series
    metricSelector: {}
  # Arbitrary additional HPA metric entries appended verbatim to spec.metrics.
  # Use this for cloud-provider native metrics that don't map cleanly to the
  # generic loadBalancerRPS block. Example (GCP GCLB capacity utilization):
  #   extraMetrics:
  #     - type: External
  #       external:
  #         metric:
  #           name: "autoscaling.googleapis.com|gclb-capacity-utilization"
  #           selector:
  #             matchLabels:
  #               resource.labels.backend_target_name: "<backend-service-name>"
  #         target:
  #           type: AverageValue
  #           averageValue: "0.8"   # scale at 80% of maxRatePerEndpoint
  extraMetrics: []

# Name of a pre-existing Kubernetes Secret containing operator credentials.
# Optional. When set, the secret must contain keys OPERATOR_ID_MAIN and OPERATOR_KEY_MAIN.
# Create the secret externally (e.g. kubectl create secret generic <name> --from-literal=OPERATOR_ID_MAIN=... --from-literal=OPERATOR_KEY_MAIN=...)
existingSecret: ''

# For reference see .env.ws.example
config:
  # Transport Selection
  RPC_HTTP_ENABLED: false
  RPC_WS_ENABLED: true

  # ========== REQUIRED CONFIGURATION ==========
  # Network Configuration
  CHAIN_ID: ''
  HEDERA_NETWORK: ''
  MIRROR_NODE_URL: ''

  # OPERATOR_KEY_FORMAT:

  # WebSocket Configuration
  SUBSCRIPTIONS_ENABLED: true

  # ========== WEBSOCKET SERVER SETTINGS ==========
  # WEB_SOCKET_PORT:
  # WEB_SOCKET_HTTP_PORT:
  # WS_CONNECTION_LIMIT:
  # WS_CONNECTION_LIMIT_PER_IP:
  # WS_MAX_INACTIVITY_TTL:
  # WS_PING_INTERVAL:

  # ========== SUBSCRIPTION CONFIGURATION ==========
  # WS_SUBSCRIPTION_LIMIT:
  # WS_MULTIPLE_ADDRESSES_ENABLED:
  # WS_NEW_HEADS_ENABLED:
  # WS_SAME_SUB_FOR_SAME_EVENT:
  # WS_POLLING_INTERVAL:
  # WS_RELAY_URL:

  # ========== CACHE & BATCH CONFIGURATION ==========
  # WS_CACHE_TTL:
  # WS_BATCH_REQUESTS_ENABLED:
  # WS_BATCH_REQUESTS_MAX_SIZE:

  # ========== MIRROR NODE CONFIGURATION ==========
  # MIRROR_NODE_RETRIES:
  # MIRROR_NODE_RETRY_DELAY:
  # MIRROR_NODE_TIMEOUT:
  # MIRROR_NODE_LIMIT_PARAM:
  # MIRROR_NODE_URL_HEADER_X_API_KEY:
  # MIRROR_NODE_URL_WEB3:
  # MIRROR_NODE_AGENT_CACHEABLE_DNS:

  # ========== ETH CALL CONFIGURATION ==========
  # CONSENSUS_MAX_EXECUTION_TIME:
  # SDK_REQUEST_TIMEOUT:
  # CONTRACT_QUERY_TIMEOUT_RETRIES:

  # ========== REDIS CONFIGURATION ==========
  REDIS_ENABLED: false
  # REDIS_URL:
  # REDIS_RECONNECT_DELAY_MS:

  # ========== OTHER SETTINGS ==========
  # CLIENT_TRANSPORT_SECURITY:
  # USE_ASYNC_TX_PROCESSING:
  # LOG_LEVEL: 'trace'

# Redis integration - these settings override any manually configured Redis settings
# when Redis is enabled via the parent chart
redis:
  # When true, automatically sets REDIS_ENABLED=true and
  # REDIS_URL=redis://<release-name>-redis-master:6379
  autoconfig: true

# -- Extra environment variables from existing secrets or configmaps
extraEnvFrom: []
# - secretRef:
#     name: '{{ .Release.Name }}-env'

fullnameOverride: ''

global:
  namespaceOverride: ''

image:
  pullPolicy: IfNotPresent
  registry: ghcr.io
  repository: hiero-ledger/hiero-json-rpc-relay
  # Overrides the image tag whose default is the chart appVersion.
  tag: ''

imagePullSecrets: []

ingress:
  enabled: false
  className: ''
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

livenessProbe:
  failureThreshold: 5
  httpGet:
    path: /health/liveness
    port: metrics
  periodSeconds: 10
  timeoutSeconds: 5

nameOverride: ''

nodeSelector: {}

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

ports:
  - name: websocket
    containerPort: 8546
  # metrics port for http endpoints (metrics and health)
  - name: metrics
    containerPort: 8547

replicaCount: 2

resources:
  limits:
    cpu: 1100m
    memory: 700Mi
  requests:
    cpu: 1100m
    memory: 350Mi

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: false

service:
  annotations: {}
  port: 8546
  type: ClusterIP

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ''

tolerations: []

readinessProbe:
  failureThreshold: 5
  httpGet:
    path: /health/readiness
    port: metrics
  timeoutSeconds: 5

startupProbe:
  failureThreshold: 20
  httpGet:
    path: /health/readiness
    port: metrics
  periodSeconds: 1
  timeoutSeconds: 1

terminationGracePeriodSeconds: 60

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 10%
    maxUnavailable: 25%
