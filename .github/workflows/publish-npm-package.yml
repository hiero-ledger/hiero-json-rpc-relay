# SPDX-License-Identifier: Apache-2.0

name: Publish Package to npmjs

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.77.0 or v0.77.0-rc1)'
        required: true
      dry-run-enabled:
        description: 'Enable dry run mode'
        type: boolean
        required: false
        default: true

permissions:
  contents: read
  id-token: write   # required for npm trusted publishing (OIDC)

concurrency:
  group: publish-npm
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  create-npm-package:
    runs-on: hiero-smart-contracts-linux-medium
    outputs:
      artifact: ${{ steps.build-package.outputs.artifact-name }}
      is-rc: ${{ steps.resolve-tag.outputs.is-rc }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Resolve tag reference
        id: resolve-tag
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi

          # Strip leading 'v' if present
          VERSION="${TAG#v}"

          if [[ -z "$VERSION" ]]; then
            echo "::error::Could not determine version from tag: ${TAG}"
            exit 1
          fi

          # Determine if this is an RC release
          if [[ "$VERSION" == *-rc* ]]; then
            IS_RC="true"
          else
            IS_RC="false"
          fi

          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "is-rc=${IS_RC}" >> $GITHUB_OUTPUT
          echo "Resolved tag=${TAG}, version=${VERSION}, is-rc=${IS_RC}"

      - name: Checkout repository at tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.resolve-tag.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22.3.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup JQ
        uses: dcarbone/install-jq-action@b7ef57d46ece78760b4019dbc4080a1ba2a40b45 # v3.2.0
        with:
          version: 1.7

      - name: Verify package version matches tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.resolve-tag.outputs.version }}"

          if [[ "$PACKAGE_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::package.json version (${PACKAGE_VERSION}) does not match tag version (${TAG_VERSION})"
            exit 1
          fi

      - name: Clean install (no scripts)
        run: npm ci --ignore-scripts

      - name: Run build
        run: npm run build

      - name: Build standalone
        run: node scripts/build-standalone.js

      - name: Build Package
        id: build-package
        run: |
          PACK_OUTPUT=$(npm pack --json)
          echo "$PACK_OUTPUT"

          FILENAME=$(echo "$PACK_OUTPUT" | jq -r '.[0].filename')

          if [[ -z "$FILENAME" || "$FILENAME" == "null" ]]; then
            echo "Failed to determine package filename"
            exit 1
          fi

          echo "artifact-name=${FILENAME}" >> $GITHUB_OUTPUT
          ls -lh "$FILENAME"

      - name: Generate checksum
        run: |
          sha256sum "${{ steps.build-package.outputs.artifact-name }}" > package.sha256

      - name: Upload NPM Package Artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: npm-package
          path: |
            ./${{ steps.build-package.outputs.artifact-name }}
            package.sha256
          if-no-files-found: error

  publish-npm-package:
    runs-on: ubuntu-latest
    needs: create-npm-package

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22.3.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Install NPM latest
        run: npm install -g npm@11.7.0

      - name: Download NPM Package Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package

      - name: Verify checksum
        run: |
          sha256sum -c package.sha256

      - name: Publish npm package
        run: |
          args="--access=public --provenance --ignore-scripts"

          if [[ "${{ inputs.dry-run-enabled }}" == "true" ]]; then
            args="${args} --dry-run"
          fi

          if [[ "${{ needs.create-npm-package.outputs.is-rc }}" == "true" ]]; then
            args="${args} --tag rc"
          fi

          package="${{ needs.create-npm-package.outputs.artifact }}"

          echo "::group::Publishing package: ${package} with args: ${args}"
          npm publish "${package}" ${args}
          echo "::endgroup::"
