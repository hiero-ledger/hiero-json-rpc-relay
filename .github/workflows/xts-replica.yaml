# SPDX-License-Identifier: Apache-2.0
# Replicates the CN 818-call-json-rpc-relay-regression workflow so relay-side XTS
# changes can be validated without waiting for CN team to trigger a dry run.
name: "XTS: JSON-RPC Relay Regression Replica"
on:
  push:
    branches:
      - xts-replica-v2

defaults:
  run:
    shell: bash

permissions:
  checks: write
  contents: read
  actions: write

env:
  SOLO_CLUSTER_NAME: "solo-rpc-relay-e2e"
  SOLO_NAMESPACE: "solo-rpc-relay-e2e"
  SOLO_DEPLOYMENT: "solo-rpc-relay-deployment"
  SOLO_CLUSTER_SETUP_NAMESPACE: "solo-setup"
  GRADLE_EXEC: ionice -c 2 -n 2 nice -n 19 ./gradlew

jobs:
  json-rpc-relay-regression:
    name: XTS Replica
    runs-on: hiero-smart-contracts-linux-large
    timeout-minutes: 120
    steps:
      # Check out the relay (this repo) — tests will run from here
      - name: Checkout JSON-RPC Relay
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true

      # Check out CN source so we can build the node binary for solo
      - name: Checkout hiero-consensus-node
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: hiero-ledger/hiero-consensus-node
          path: hiero-consensus-node
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ac638b010cf58a27ee6c972d7336334ccaf61c96 # v4.4.1
        with:
          cache-read-only: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      # Build CN artifacts — solo needs these via --local-build-path
      - name: Build hiero-consensus-node
        run: ${GRADLE_EXEC} assemble
        working-directory: hiero-consensus-node

      - name: Install NodeJS Dependencies (json-rpc-relay)
        run: npm ci

      - name: Install Solo
        run: npm install -g @hiero-ledger/solo@0.79.0

      - name: Setup Kind
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          install_only: true
          node_image: kindest/node:v1.31.4@sha256:2cb39f7295fe7eafee0842b1052a599a4fb0f8bcf3f83d96c7f4864c357c6c30
          version: v0.26.0
          kubectl_version: v1.31.4
          verbosity: 3
          wait: 120s

      - name: Configure and run solo
        run: |
          kind create cluster -n "${SOLO_CLUSTER_NAME}"
          solo init
          solo cluster-ref config connect --cluster-ref kind-${SOLO_CLUSTER_NAME} --context kind-${SOLO_CLUSTER_NAME}
          solo deployment config create -n "${SOLO_NAMESPACE}" --deployment "${SOLO_DEPLOYMENT}"
          solo deployment cluster attach --deployment "${SOLO_DEPLOYMENT}" --cluster-ref kind-${SOLO_CLUSTER_NAME} --num-consensus-nodes 1
          solo keys consensus generate --gossip-keys --tls-keys --deployment "${SOLO_DEPLOYMENT}"
          solo cluster-ref config setup -s "${SOLO_CLUSTER_SETUP_NAMESPACE}"
          solo consensus network deploy --deployment "${SOLO_DEPLOYMENT}"
          solo consensus node setup --deployment "${SOLO_DEPLOYMENT}" --local-build-path ./hiero-consensus-node/hedera-node/data
          solo consensus node start --deployment "${SOLO_DEPLOYMENT}"
          solo mirror node add --deployment "${SOLO_DEPLOYMENT}" --cluster-ref kind-${SOLO_CLUSTER_NAME} --enable-ingress --pinger

      # Solo tears down its internal port-forward for CN gRPC after setup health checks.
      # Persist it so the SDK can reach the consensus node during tests (same pattern as 821).
      - name: Port-forward consensus node gRPC
        run: |
          kubectl port-forward svc/haproxy-node1-svc -n "${SOLO_NAMESPACE}" 50211:non-tls-grpc-client-port &
          for i in $(seq 1 10); do
            nc -z 127.0.0.1 50211 2>/dev/null && echo "Port 50211 ready (attempt $i)" && break
            sleep 2
          done

      # Solo 0.79.0 changed mirror ingress port-forward to 38081.
      # /health/readiness goes green before the REST backend is fully ready,
      # so poll the data plane directly to avoid socket hang up on relay startup.
      - name: Wait for Mirror Node REST API to stabilize
        run: |
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:38081/api/v1/blocks?limit=1")
            if [ "$status" = "200" ]; then echo "Mirror node ready (attempt $i)"; exit 0; fi
            echo "Attempt $i: HTTP $status, retrying in 5s..."
            sleep 5
          done
          echo "Mirror node did not stabilize in 150s"; exit 1

      - name: Start json-rpc-relay-test-client
        env:
          CHAIN_ID: "0x12a"
          MIRROR_NODE_URL: "http://127.0.0.1:38081"
          HEDERA_NETWORK: '{"127.0.0.1:50211":"0.0.3"}'
          OPERATOR_ID_MAIN: 0.0.2
          OPERATOR_KEY_MAIN: 302e020100300506032b65700422042091132178e72057a1d7528025956fe39b0b847f200ab59b2fdd367017f3087137
          REDIS_ENABLED: false
          USE_ASYNC_TX_PROCESSING: false
        run: npm run build && npm run acceptancetest:xts

      - name: Stop solo
        if: ${{ always() }}
        run: kind delete cluster -n ${{ env.SOLO_CLUSTER_NAME }}
