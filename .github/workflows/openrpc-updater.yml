name: OpenRPC JSON Updater

on:
  schedule:
    - cron: '0 14 * * 5' # Runs every Friday at 14:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  precheck:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.find-pr.outputs.proceed }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Check for existing OpenRPC update PRs
        id: find-pr
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const { owner, repo } = context.repo;
            const prs = await github.rest.pulls.list({ owner, repo, state: 'open', per_page: 100 });
            const exists = prs.data.some(pr =>
              (pr.title && pr.title.includes('docs: update OpenRPC JSON')) ||
              (pr.head && pr.head.ref && pr.head.ref.startsWith('update-openrpc-'))
            );
            core.info(`Existing OpenRPC update PR detected: ${exists}`);
            core.setOutput('proceed', exists ? 'false' : 'true');

  clone-and-build-execution-apis:
    runs-on: ubuntu-latest
    needs: precheck
    if: ${{ needs.precheck.outputs.proceed == 'true' }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout execution-apis repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ethereum/execution-apis
          ref: main # We need to be up to date with the latest main branch
          path: execution-apis

      - name: Use Node.js TLS 22
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
        working-directory: ./execution-apis

      - name: Build project
        run: npm run build
        working-directory: ./execution-apis

      - name: Upload openrpc.json as an artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: openrpc
          path: ./execution-apis/refs-openrpc.json

  update-openrpc:
    runs-on: ubuntu-latest
    needs:
      - precheck
      - clone-and-build-execution-apis
    if: ${{ needs.precheck.outputs.proceed == 'true' }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Download openrpc.json artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: openrpc
          path: ./downloaded-artifacts/

      - name: Copy generated openrpc.json to scripts directory
        run: |
          mkdir -p scripts/openrpc-json-updater
          cp ./downloaded-artifacts/refs-openrpc.json scripts/openrpc-json-updater/original-openrpc.json

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: scripts/openrpc-json-updater
        run: npm ci

      - name: Generate Markdown comparison report
        id: generate-report
        working-directory: scripts/openrpc-json-updater
        run: |
          node cli.js --original ./original-openrpc.json --modified ../../docs/openrpc.json --report-md ./openrpc-report.md

      # This workflow automatically creates PRs when the OpenRPC JSON file differs from the upstream source.
      # PRs are only created when actual changes are detected (SKIP_PR=false), ensuring that
      # maintainers can review and approve schema updates before they're merged into the main branch.
      # This provides a safety mechanism for tracking OpenRPC specification changes over time.
      - name: Perform merge
        id: merge
        working-directory: scripts/openrpc-json-updater
        run: |
          MERGE_OUTPUT=$(node cli.js --merge --original ./original-openrpc.json --modified ../../docs/openrpc.json)
          MERGE_EXIT_CODE=$?
          echo "$MERGE_OUTPUT"

          if [ $MERGE_EXIT_CODE -eq 0 ]; then
            if [[ "$MERGE_OUTPUT" =~ No\ differences\ found\ after\ merge ]]; then
              echo "No differences found. Skipping PR creation."
              echo "SKIP_PR=true" >> $GITHUB_ENV
              exit 0
            elif [[ "$MERGE_OUTPUT" == *"Merge completed"* ]]; then
              echo "Successfully updated openrpc.json"
              echo "SKIP_PR=false" >> $GITHUB_ENV
            else
              echo "Unexpected output. Output was: $MERGE_OUTPUT"
              exit 1
            fi
          else
            echo "Failed to update file. Output was: $MERGE_OUTPUT"
            exit 1
          fi

      - name: Generate unique branch name
        id: branch-name
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          UNIQUE_BRANCH="update-openrpc-${TIMESTAMP}"
          echo "UNIQUE_BRANCH=${UNIQUE_BRANCH}" >> $GITHUB_ENV
          echo "Generated unique branch name: ${UNIQUE_BRANCH}"

      - name: Import GPG Key
        if: ${{ env.SKIP_PR != 'true' }}
        id: gpg_importer
        uses: step-security/ghaction-import-gpg@c86c374c0659a6c2d1284bccf8af889e73ce8fe0 # v6.3.0
        with:
          git_commit_gpgsign: true
          git_tag_gpgsign: true
          git_user_signingkey: true
          gpg_private_key: ${{ secrets.GPG_KEY_CONTENTS }}
          passphrase: ${{ secrets.GPG_KEY_PASSPHRASE }}

      - name: Create Pull Request
        if: ${{ env.SKIP_PR != 'true' }}
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}
          commit-message: "docs: update OpenRPC JSON"
          committer: ${{ steps.gpg_importer.outputs.name }} <${{ steps.gpg_importer.outputs.email }}>
          author: ${{ steps.gpg_importer.outputs.name }} <${{ steps.gpg_importer.outputs.email }}>
          signoff: true
          title: 'docs: update OpenRPC JSON'
          body-path: scripts/openrpc-json-updater/openrpc-report.md
          branch: ${{ env.UNIQUE_BRANCH }}
          base: 'main'
          add-paths: docs/openrpc.json
          delete-branch: true
          labels: 'internal'
          assignees: 'swirlds-automation'
