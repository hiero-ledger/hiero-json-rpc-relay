name: Dapp Tests

on:
  pull_request:
    branches: [main, release/**]
  push:
    branches: [main, release/**]
    tags: [v*]

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  setup-local-hedera:
    name: Dapp Tests
    runs-on: hiero-smart-contracts-linux-medium
    timeout-minutes: 45 # Set to 45 minutes for now
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y make gcc g++

      - name: Install packages
        run: npm ci

      - name: Create .env file
        run: |
          cp ./dapp-example/localDappCI.env ./dapp-example/.env
          cp ./tests/server/localAcceptance.env .env

      - name: Build Typescript
        run: npm run build

      - name: Generate falcon-values config file
        run: |
          cat > .github/falcon.yml <<EOF
          network:
            --release-tag: "v0.72.0"
            --node-aliases: "node1"
          setup:
            --release-tag: "v0.72.0"
            --node-aliases: "node1"
          consensusNode:
            --node-aliases: "node1"
            --force-port-forward: true
          mirrorNode:
            --enable-ingress: true
            --pinger: true
            --mirror-node-version: "v0.151.0"
            --values-file: .github/mirror-node-values.yaml
          EOF

      - name: Setup Kind
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          install_only: true
          node_image: kindest/node:v1.32.5@sha256:e3b2327e3a5ab8c76f5ece68936e4cafaa82edf58486b769727ab0b3b97a5b0d
          version: v0.29.0
          kubectl_version: v1.32.5
          verbosity: 3
          wait: 120s

      - name: Start the solo node
        run: |
          npx @hashgraph/solo@0.68.0 one-shot falcon deploy \
            --values-file .github/falcon.yml \
            --dev \
            --deploy-relay=false
        timeout-minutes: 15

      - name: Forward solo ports
        run: .github/scripts/forward-ports.sh

      - name: Start Redis
        run: docker run -d --name redis -p 6379:6379 redis:7-alpine

      - name: Start the local relay
        run: npm run start &

      - name: Build, Bootstrap & Test the dapp in Docker
        run: docker compose up --exit-code-from synpress
        working-directory: ./dapp-example/

      - name: Dump relay logs
        if: ${{ always() && !cancelled() }}
        uses: step-security/gh-docker-logs@2ffe2e0e1da43c5db68902dd900c47cdba10bfe6 # v2.2.6
        with:
          dest: './logs'

      - name: Tar logs
        if: ${{ always() && !cancelled() }}
        run: tar cvzf ./logs.tgz ./logs

      - name: Upload logs to GitHub
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: logs.tgz
          path: ./logs.tgz

      - name: Publish Reports
        uses: mikepenz/action-junit-report@74626db7353a25a20a72816467ebf035f674c5f8 # v6.2.0
        if: ${{ always() && !cancelled() }}
        with:
          check_name: Dapp Test Report
          report_paths: "**/*.xml"
          detailed_summary: true
