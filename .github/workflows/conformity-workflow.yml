name: Conformity Test Workflow

on:
  pull_request:
    branches: [main, release/**]
  push:
    branches: [main, release/**]
    tags: [v*]
  workflow_dispatch:
    inputs:
      networkTag:
        description: 'Hedera network node image tag'
        required: false
        type: string
      mirrorTag:
        description: 'Hedera mirror node image tag'
        required: false
        type: string

permissions:
  contents: read

jobs:
  clone-and-build-execution-apis:
    runs-on: hiero-smart-contracts-linux-medium

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout execution-apis repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: 7907424db935b93c2fe6a3c0faab943adebe8557
          repository: 'ethereum/execution-apis'
          path: 'execution-apis'

      - name: Use Node.js TLS 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install
        working-directory: ./execution-apis

      - name: Build project
        run: npm run build
        working-directory: ./execution-apis

      - name: Upload openrpc.json as an artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: openrpc
          path: ./execution-apis/openrpc.json

  build-and-test:
    runs-on: hiero-smart-contracts-linux-medium
    needs: clone-and-build-execution-apis

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js TLS 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Install make
        run: sudo apt-get update; sudo apt-get install build-essential -y

      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install packages
        run: npm ci

      - name: Create .env file
        run: cp ./tests/server/localAcceptance.env .env

      - name: Build Typescript
        run: npm run build

      - name: Install hedera local
        run: npm install @hashgraph/hedera-local -g

      - name: Run hedera local
        run: |
          HEDERA_CMD="npx hedera restart -d --verbose=trace"
          if [ -n "${{ inputs.networkTag }}" ]; then
            HEDERA_CMD="$HEDERA_CMD --network-tag=${{ inputs.networkTag }}"
          fi
          if [ -n "${{ inputs.mirrorTag }}" ]; then
            HEDERA_CMD="$HEDERA_CMD --mirror-tag=${{ inputs.mirrorTag }}"
          fi
          $HEDERA_CMD

      - name: Stop  relay
        run: docker stop json-rpc-relay json-rpc-relay-ws

      - name: Download openrpc.json artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: openrpc

      - name: Rename file
        run: mv openrpc.json openrpc_exec_apis.json

      - name: Add ws specific env variables
        run: |
          echo "SUBSCRIPTIONS_ENABLED=true" >> .env
          echo "TEST_WS_SERVER=true" >> .env

      - name: Run conformity tests
        run: npm run acceptancetest:rpc_api_schema_conformity
