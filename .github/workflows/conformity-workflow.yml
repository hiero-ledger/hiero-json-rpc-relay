name: Conformity Test Workflow

on:
  pull_request:
    branches: [main, release/**]
  push:
    branches: [main, release/**]
    tags: [v*]
  workflow_dispatch:
    inputs:
      networkTag:
        description: 'Hedera network node image tag'
        required: false
        type: string
      mirrorTag:
        description: 'Hedera mirror node image tag'
        required: false
        type: string
      soloVersion:
        description: 'Solo version'
        required: false
        type: string

permissions:
  contents: read

jobs:
  clone-and-build-execution-apis:
    runs-on: hiero-smart-contracts-linux-medium

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout execution-apis repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: 7907424db935b93c2fe6a3c0faab943adebe8557
          repository: 'ethereum/execution-apis'
          path: 'execution-apis'

      - name: Use Node.js TLS 22
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install
        working-directory: ./execution-apis

      - name: Build project
        run: npm run build
        working-directory: ./execution-apis

      - name: Upload openrpc.json as an artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: openrpc
          path: ./execution-apis/openrpc.json

  build-and-test:
    runs-on: hiero-smart-contracts-linux-medium
    needs: clone-and-build-execution-apis

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js TLS 22
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22

      - name: Install make
        run: sudo apt-get update; sudo apt-get install build-essential -y

      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install packages
        run: npm ci

      - name: Create .env file
        run: cp ./tests/server/localAcceptance.env .env

      - name: Build Typescript
        run: npm run build

      - name: Generate falcon-values config file
        run: |
          cat > .github/falcon.yml <<EOF
          network:
            --release-tag: "${{ inputs.networkTag || 'v0.72.0' }}"
            --node-aliases: "node1"
          setup:
            --release-tag: "${{ inputs.networkTag || 'v0.72.0' }}"
            --node-aliases: "node1"
          consensusNode:
            --node-aliases: "node1"
            --force-port-forward: true
          mirrorNode:
            --enable-ingress: true
            --pinger: true
            --mirror-node-version: "${{ inputs.mirrorTag || 'v0.151.0' }}"
          EOF

      - name: Setup Kind
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          install_only: true
          node_image: kindest/node:v1.32.5@sha256:e3b2327e3a5ab8c76f5ece68936e4cafaa82edf58486b769727ab0b3b97a5b0d
          version: v0.29.0
          kubectl_version: v1.32.5
          verbosity: 3
          wait: 120s

      - name: Start the solo node
        run: |
          npx @hashgraph/solo@${{ inputs.soloVersion || '0.68.0' }} one-shot falcon deploy \
            --values-file .github/falcon.yml \
            --dev \
            --deploy-explorer=false \
            --deploy-relay=false
        timeout-minutes: 15

      - name: Forward solo ports
        run: .github/scripts/forward-ports.sh

      - name: Start Redis
        run: docker run -d --name redis -p 6379:6379 redis:7-alpine

      - name: Download openrpc.json artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: openrpc

      - name: Rename file
        run: mv openrpc.json openrpc_exec_apis.json

      - name: Add ws specific env variables
        run: |
          echo "SUBSCRIPTIONS_ENABLED=true" >> .env
          echo "TEST_WS_SERVER=true" >> .env

      - name: Run conformity tests
        run: npm run acceptancetest:rpc_api_schema_conformity
