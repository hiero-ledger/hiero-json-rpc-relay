name: Hoppscotch Endpoint Tests

on:
  pull_request:
    branches:
      - main
      - release/**
  push:
    branches:
      - main
      - release/**
    tags:
      - v*
  workflow_dispatch:
    inputs:
      networkTag:
        description: 'Hedera network node image tag'
        required: false
        type: string
      mirrorTag:
        description: 'Hedera mirror node image tag'
        required: false
        type: string
      soloVersion:
        description: 'Solo version'
        required: false
        type: string

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  setup-local-hedera:
    name: Hoppscotch Endpoint Tests
    runs-on: hiero-smart-contracts-linux-medium
    permissions:
      contents: write
      actions: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y make gcc g++

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install packages
        run: npm ci

      - name: Create .env file
        run: cp ./tests/server/localAcceptance.env .env

      - name: Build Typescript
        run: npm run build

      - name: Load pinned versions
        run: grep -vE '^[[:space:]]*(#|$)' .github/network-versions.env >> "$GITHUB_ENV"

      - name: Generate falcon-values config file
        run: |
          cat > .github/falcon.yml <<EOF
          network:
            --release-tag: "${{ inputs.networkTag || env.NETWORK_TAG }}"
            --node-aliases: "node1"
          setup:
            --release-tag: "${{ inputs.networkTag || env.NETWORK_TAG }}"
            --node-aliases: "node1"
          consensusNode:
            --node-aliases: "node1"
          mirrorNode:
            --enable-ingress: true
            --pinger: true
            --mirror-node-version: "${{ inputs.mirrorTag || env.MIRROR_NODE_TAG }}"
            --values-file: .github/mirror-node-values.yaml
          EOF

      - name: Setup Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          install_only: true
          node_image: kindest/node:v1.32.5@sha256:e3b2327e3a5ab8c76f5ece68936e4cafaa82edf58486b769727ab0b3b97a5b0d
          version: v0.29.0
          kubectl_version: v1.32.5
          verbosity: 3
          wait: 120s

      - name: Start the solo node
        run: |
          npx @hashgraph/solo@${{ inputs.soloVersion || env.SOLO_VERSION }} one-shot falcon deploy \
            --values-file .github/falcon.yml \
            --dev \
            --deploy-explorer=false \
            --deploy-relay=false
        timeout-minutes: 15

      - name: Forward solo ports
        run: .github/scripts/forward-ports.sh

      - name: Start Redis
        run: docker run -d --name redis -p 6379:6379 redis:7-alpine

      - name: Start the local relay
        run: npm run start &

      - name: Run Hoppscotch Tests
        run: npm run hopp
