name: Hoppscotch Endpoint Tests

on:
  pull_request:
    branches:
      - main
      - release/**
  push:
    branches:
      - main
      - release/**
    tags:
      - v*
  workflow_dispatch:

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  setup-local-hedera:
    name: Hoppscotch Endpoint Tests
    runs-on: hiero-smart-contracts-linux-medium
    permissions:
      contents: write
      actions: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y make gcc g++

      - name: Setup node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22

      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install packages
        run: npm ci

      - name: Create .env file
        run: cp ./tests/server/localAcceptance.env .env

      - name: Build Typescript
        run: npm run build

      - name: Setup Kind
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          install_only: true
          node_image: kindest/node:v1.32.5@sha256:e3b2327e3a5ab8c76f5ece68936e4cafaa82edf58486b769727ab0b3b97a5b0d
          version: v0.29.0
          kubectl_version: v1.32.5
          verbosity: 3
          wait: 120s

      - name: Start the solo node
        run: |
          npx @hashgraph/solo@${{ inputs.soloVersion || '0.64.1' }} one-shot single deploy \
            --dev \
            --force-port-forward \
            --deploy-relay=false
        timeout-minutes: 15

      - name: Forward solo mirror node web3 port
        run: |
          NS=$(kubectl get ns -o name | sed 's|^namespace/||' | grep 'hiero' | head -n1)
          POD="$(kubectl get pods -A --no-headers | grep -E mirror | grep "web3" | head -n 1 | awk '{print $2}' | head -n1)"
          kubectl port-forward "$POD" -n "$NS" "8545:8545" >/dev/null 2>&1 &

      - name: Start Redis
        run: docker run -d --name redis -p 6379:6379 redis:7-alpine

      - name: Start the local relay
        run: npm run start &

      - name: Run Hoppscotch Tests
        run: npm run hopp
