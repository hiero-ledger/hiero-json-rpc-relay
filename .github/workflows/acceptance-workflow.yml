name: Reusable acceptance tests workflow

on:
  workflow_call:
    inputs:
      testfilter:
        required: true
        type: string
      test_ws_server:
        required: false
        default: false
        type: boolean
      test_rate_limits:
        required: false
        default: false
        type: boolean
      on_valid_json_rpc_http_response_status_code:
        required: false
        default: 400
        type: number
      envfile:
        required: false
        default: localAcceptance.env
        type: string
      operator_id:
        required: false
        type: string
      networkTag:
        required: false
        type: string
      mirrorTag:
        required: false
        type: string
      relayTag:
        required: false
        type: string
      soloVersion:
        required: false
        type: string
    secrets:
      operator_key:
        description: 'The ED25519, ECDSA, or DER encoded private key of the operator'
        required: false
      CODECOV_TOKEN:
        description: 'Codecov upload token'
        required: true

permissions:
  contents: read

jobs:
  acceptance-workflow:
    runs-on: hiero-smart-contracts-linux-large
    timeout-minutes: 50
    permissions:
      contents: read
      checks: write
    steps:
      - name: Set env variables
        run: |
          if [ -n "${{ inputs.operator_id }}" ]; then
            echo "OPERATOR_ID_MAIN=${{ inputs.operator_id }}" >> $GITHUB_ENV
          fi

      - name: Set rate limiting variables
        if: ${{ inputs.test_rate_limits == true }}
        run: |
          echo "RATE_LIMIT_DISABLED=false" >> $GITHUB_ENV
          echo "DEFAULT_RATE_LIMIT=200" >> $GITHUB_ENV
          echo "TIER_1_RATE_LIMIT=100" >> $GITHUB_ENV
          echo "TIER_2_RATE_LIMIT=800" >> $GITHUB_ENV
          echo "TIER_3_RATE_LIMIT=1600" >> $GITHUB_ENV
          echo "LIMIT_DURATION=60000" >> $GITHUB_ENV

      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Install make
        run: sudo apt-get update; sudo apt-get install build-essential -y

      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install packages
        run: npm ci

      - name: Create .env file
        run: cp ./tests/server/${{ inputs.envfile }} .env

      - name: Build Typescript
        run: npm run build

      - name: Generate falcon-values config file
        run: |
          cat > .github/falcon.yml <<EOF
          network:
            --release-tag: "${{ inputs.networkTag || 'v0.72.0' }}"
            --node-aliases: "node1"
          setup:
            --release-tag: "${{ inputs.networkTag || 'v0.72.0' }}"
            --node-aliases: "node1"
          consensusNode:
            --node-aliases: "node1"
          mirrorNode:
            --enable-ingress: true
            --pinger: true
            --mirror-node-version: "${{ inputs.mirrorTag || 'v0.151.0' }}"
            --values-file: .github/mirror-node-values.yaml
          EOF

      - name: Setup Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          install_only: true
          node_image: kindest/node:v1.32.5@sha256:e3b2327e3a5ab8c76f5ece68936e4cafaa82edf58486b769727ab0b3b97a5b0d
          version: v0.29.0
          kubectl_version: v1.32.5
          verbosity: 3
          wait: 120s

      - name: Start the solo node
        run: |
          npx @hashgraph/solo@${{ inputs.soloVersion || '0.68.0' }} one-shot falcon deploy \
            --values-file .github/falcon.yml \
            --dev \
            --deploy-explorer=false \
            --deploy-relay=false
        timeout-minutes: 15

      - name: Forward solo ports
        run: .github/scripts/forward-ports.sh

      - name: Start Redis
        run: docker run -d --name redis -p 6379:6379 redis:7-alpine

      - name: Run acceptance tests
        run: |
            if [[ -n "$OPERATOR_KEY" ]] && [[ "$OPERATOR_KEY" != "" ]]; then
              echo "Overriding OPERATOR_KEY_MAIN with the secret value"
              export OPERATOR_KEY_MAIN="$OPERATOR_KEY"
            fi
            npm run acceptancetest:${{ inputs.testfilter }}
        env:
          TEST_WS_SERVER: ${{ inputs.test_ws_server }}
          SUBSCRIPTIONS_ENABLED: ${{ inputs.test_ws_server }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PR_NUMBER: ${{ github.event.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OPERATOR_KEY: ${{ secrets.operator_key }}
          ON_VALID_JSON_RPC_HTTP_RESPONSE_STATUS_CODE: "${{ inputs.on_valid_json_rpc_http_response_status_code }}"

      - name: Upload Heap Snapshots
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: Heap Snapshots
          path: '**/*.heapsnapshot'
          if-no-files-found: ignore

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: Test Results (${{ inputs.testfilter }}) ${{ inputs.on_valid_json_rpc_http_response_status_code}}
          path: test-*.xml

      - name: Upload coverage report
        if: ${{ github.actor != 'dependabot[bot]' && !cancelled() && always() }}
        run: bash .github/scripts/codecov-upload.sh
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Publish Test Report
        uses: step-security/publish-unit-test-result-action@7dff603bf17ef13dee847147bef8d7cd1728b566 # v2.22.0
        if: ${{ github.actor != 'dependabot[bot]' && !cancelled() }}
        with:
          check_name: '' # Set to empty to disable check run
          comment_mode: off
          json_thousands_separator: ','
          files: 'test-*.xml'
          github_token: ${{ secrets.GITHUB_TOKEN }}
