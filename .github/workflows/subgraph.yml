name: Subgraph Tests

on:
  pull_request:
    branches: [main, release/**]
  push:
    branches: [main, release/**]
    tags: [v*]

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  subgraph-workflow:
    runs-on: hiero-smart-contracts-linux-medium
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./tools/subgraph-example/
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: Setup node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 22

      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: npm ci

      - name: Install relay dependencies
        working-directory: .
        run: npm ci

      - name: Create .env file
        run: cp .env.example .env

      - name: Create relay .env file
        working-directory: .
        run: cp ./tests/server/localAcceptance.env .env

      - name: Build relay typescript
        working-directory: .
        run: npm run build

      - name: Generate falcon-values config file
        working-directory: .
        run: |
          cat > .github/falcon.yml <<EOF
          network:
            --release-tag: "v0.72.0"
            --node-aliases: "node1"
          setup:
            --release-tag: "v0.72.0"
            --node-aliases: "node1"
          consensusNode:
            --node-aliases: "node1"
          mirrorNode:
            --enable-ingress: true
            --pinger: true
            --mirror-node-version: "v0.151.0"
            --values-file: .github/mirror-node-values.yaml
          EOF

      - name: Setup Kind
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          install_only: true
          node_image: kindest/node:v1.32.5@sha256:e3b2327e3a5ab8c76f5ece68936e4cafaa82edf58486b769727ab0b3b97a5b0d
          version: v0.29.0
          kubectl_version: v1.32.5
          verbosity: 3
          wait: 120s

      - name: Start the solo node
        working-directory: .
        run: |
          npx @hashgraph/solo@0.68.0 one-shot falcon deploy \
            --values-file .github/falcon.yml \
            --dev \
            --deploy-explorer=false \
            --deploy-relay=false
        timeout-minutes: 15

      - name: Forward solo ports
        working-directory: .
        run: .github/scripts/forward-ports.sh

      - name: Start Redis
        run: docker run -d --name redis -p 6379:6379 redis:7-alpine

      - name: Start the local relay
        working-directory: .
        run: npm run start &

      - name: Compile contracts
        run: npx hardhat compile

      - name: Deploy and interact with contracts
        run: npx hardhat prepare

      - name: Generate types
        run: npm run graph-codegen

      - name: Start local graph-node
        env:
          IPFS_PROFILE: test
        run: npm run graph-local -- --detach

      - name: Sleep for 20 seconds
        run: sleep 20s
        shell: bash

      - name: Create subgraph
        run: npm run create-local

      - name: Deploy subgraph
        run: npm run deploy-local -- --network local --version-label 0.0.1

      - name: Sleep for 10 seconds (allow time to index past events following new sub-graph deployment)
        run: sleep 10s
        shell: bash

      - name: Run the tests
        run: npx hardhat test
